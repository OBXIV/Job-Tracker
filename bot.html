<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Add Bot — Job Pipeline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f4f6f9;color:#1e293b;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
header{background:#1e293b;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;background:#3b82f6;border-radius:8px;display:grid;place-items:center;font-size:16px}
header h1{font-size:16px;font-weight:600}
.hdr-link{color:#94a3b8;font-size:13px;text-decoration:none;transition:color .15s}
.hdr-link:hover{color:#fff}
main{flex:1;padding:32px 24px;max-width:640px;width:100%;margin:0 auto}

/* ── Auto-save screen ── */
#autoScreen{display:none}
.auto-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;margin-bottom:16px}
.auto-saving{padding:40px 24px;text-align:center}
.auto-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.auto-saving p{color:#64748b;font-size:14px}
.auto-result{padding:28px 24px;text-align:center;display:none}
.auto-result-icon{font-size:44px;margin-bottom:14px}
.auto-result h2{font-size:18px;font-weight:700;margin-bottom:6px}
.auto-result .sub{color:#64748b;font-size:13px;margin-bottom:24px;line-height:1.6}
.auto-result.ok .auto-result-icon::before{content:'✅'}
.auto-result.err .auto-result-icon::before{content:'⚠️'}
.detail-grid{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;text-align:left;margin-bottom:20px}
.detail-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:#64748b;width:90px;flex-shrink:0;font-weight:500}
.detail-val{color:#1e293b}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
button{padding:9px 18px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;color:#1e293b;display:inline-flex;align-items:center;gap:6px}
button:hover{background:#f8fafc}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
.btn-primary:hover{background:#2563eb;border-color:#2563eb}
.btn-danger{background:#ef4444;color:#fff;border-color:#ef4444}
.btn-danger:hover{background:#dc2626;border-color:#dc2626}
.btn-orange{background:#f97316;color:#fff;border-color:#f97316}
.btn-orange:hover{background:#ea580c;border-color:#ea580c}

/* ── Manual / Edit screen ── */
#manualScreen{display:none}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px}
.page-sub{color:#64748b;font-size:13px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:16px;overflow:hidden}
.card-head{padding:13px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.ch-icon{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.blue-icon{background:#eff6ff}
.orange-icon{background:#fff7ed}
.ch-text{flex:1}
.ch-title{font-size:13px;font-weight:600}
.ch-sub{font-size:11px;color:#64748b;margin-top:1px}
.db-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
.db-dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1;flex-shrink:0;transition:background .3s}
.db-dot.ok{background:#10b981}
.db-dot.err{background:#ef4444}
.card-body{padding:18px}
.banner{border-radius:9px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px}
.banner.show{display:flex}
.banner.add{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.banner.update{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;font-family:inherit;color:#1e293b;background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.fg textarea{resize:vertical;min-height:72px;line-height:1.55}
.fg input:disabled,.fg select:disabled,.fg textarea:disabled{background:#f8fafc;color:#94a3b8;cursor:not-allowed}
.submit-row{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn-submit{background:#3b82f6;color:#fff;border-color:#3b82f6;padding:10px 24px;font-size:14px}
.btn-submit:hover{background:#2563eb;border-color:#2563eb}
.btn-submit-orange{background:#f97316;color:#fff;border-color:#f97316;padding:10px 24px;font-size:14px}
.btn-submit-orange:hover{background:#ea580c;border-color:#ea580c}
.result{margin-top:14px;padding:11px 14px;border-radius:9px;font-size:13px;display:none;align-items:center;gap:8px}
.result.show{display:flex}
.result.ok{background:#ecfdf5;border:1px solid #6ee7b7;color:#064e3b}
.result.err{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}.fg.full{grid-column:1}}
</style>
</head>
<body>
<header>
  <div class="hdr-left">
    <div class="hdr-logo">🤖</div>
    <h1>Quick Add Bot</h1>
  </div>
  <a class="hdr-link" href="index.html">← Back to Tracker</a>
</header>

<main>
  <!-- ── AUTO-SAVE SCREEN ── -->
  <div id="autoScreen">
    <div class="auto-card">
      <div class="auto-saving" id="savingState">
        <div class="auto-spinner"></div>
        <p>Saving to pipeline…</p>
      </div>
      <div class="auto-result" id="resultState">
        <div class="auto-result-icon"></div>
        <h2 id="resultTitle"></h2>
        <p class="sub" id="resultSub"></p>
        <div class="detail-grid" id="detailGrid"></div>
        <div class="btn-row" id="btnRow"></div>
      </div>
    </div>
  </div>

  <!-- ── MANUAL / EDIT SCREEN ── -->
  <div id="manualScreen">
    <div class="page-title" id="pageTitle">Add Application</div>
    <p class="page-sub" id="pageSub">Fields auto-fill when opened via a Claude-generated link, or enter manually.</p>
    <div class="card">
      <div class="card-head">
        <div class="ch-icon" id="cardIcon">📋</div>
        <div class="ch-text">
          <div class="ch-title" id="cardTitle">Application details</div>
          <div class="ch-sub" id="cardSub">Review and confirm before saving</div>
        </div>
        <div class="db-pill"><div class="db-dot" id="dbDot"></div><span id="dbLabel">Connecting…</span></div>
      </div>
      <div class="card-body">
        <div class="banner" id="banner"></div>
        <div class="form-grid">
          <div class="fg full"><label for="fCompany">Company *</label><input type="text" id="fCompany" placeholder="e.g. Acme Corp" /></div>
          <div class="fg full"><label for="fRole">Role / Title</label><input type="text" id="fRole" placeholder="e.g. Director of IT" /></div>
          <div class="fg"><label for="fApplied">Date Applied</label><input type="date" id="fApplied" /></div>
          <div class="fg">
            <label for="fStage">Stage</label>
            <select id="fStage">
              <option>Applied</option><option>HM Outreach</option><option>Phone Screen</option>
              <option>Interview</option><option>Final Round</option><option>Offer</option>
              <option>Rejected</option><option>Withdrawn</option>
            </select>
          </div>
          <div class="fg full"><label for="fContact">HM Contact</label><input type="text" id="fContact" placeholder="Hiring manager name (optional)" /></div>
          <div class="fg full"><label for="fNotes">Notes</label><textarea id="fNotes" placeholder="Location, salary, source, anything else…"></textarea></div>
        </div>
        <div class="submit-row">
          <button class="btn-submit" id="submitBtn" onclick="submitManual()">＋ Add to Pipeline</button>
          <button onclick="clearForm()">Clear</button>
        </div>
        <div class="result" id="manualResult"></div>
      </div>
    </div>
  </div>
</main>

<script>
const DB = 'https://job-tracker-f6ed5-default-rtdb.firebaseio.com/pipeline.json';
let mode = 'add';
let updateId = null;
let savedEntry = null;

const p = new URLSearchParams(window.location.search);
const isAuto   = p.get('auto') === '1';
const hasId    = !!p.get('id');
mode = hasId ? 'update' : 'add';
updateId = hasId ? parseInt(p.get('id')) : null;

// ── Route to correct screen ───────────────────────────────────────────────────
if (isAuto) {
  document.getElementById('autoScreen').style.display = 'block';
  autoSave();
} else {
  document.getElementById('manualScreen').style.display = 'block';
  initManual();
}

// ── AUTO-SAVE ─────────────────────────────────────────────────────────────────
async function autoSave() {
  try {
    const r = await fetch(DB);
    if (!r.ok) throw new Error('Read failed: HTTP ' + r.status);
    const arr = await r.json();
    if (!Array.isArray(arr)) throw new Error('Unexpected data format');

    if (mode === 'update') {
      const idx = arr.findIndex(d => d.id === updateId);
      if (idx === -1) throw new Error('Entry #' + updateId + ' not found');
      const dbMap = {company:'company',role:'role',applied:'applied',stage:'stage',contact:'hmContact',notes:'notes'};
      const changed = {};
      ['company','role','applied','stage','contact','notes'].forEach(param => {
        if (p.get(param)) { arr[idx][dbMap[param]] = p.get(param); changed[param] = p.get(param); }
      });
      const w = await fetch(DB, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(arr)});
      if (!w.ok) throw new Error('Write failed: HTTP ' + w.status);
      savedEntry = arr[idx];
      showAutoSuccess('update', arr[idx], changed);
    } else {
      const maxId = arr.length ? Math.max(...arr.map(d => d.id||0)) : 999;
      const entry = {
        id: maxId + 1,
        company:   p.get('company') || '',
        role:      p.get('role')    || '',
        applied:   p.get('applied') || new Date().toISOString().split('T')[0],
        stage:     p.get('stage')   || 'Applied',
        hmContact: p.get('contact') || '',
        notes:     p.get('notes')   || ''
      };
      arr.unshift(entry);
      const w = await fetch(DB, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(arr)});
      if (!w.ok) throw new Error('Write failed: HTTP ' + w.status);
      savedEntry = entry;
      showAutoSuccess('add', entry, {});
    }
  } catch(e) {
    showAutoError(e.message || 'Unknown error');
  }
}

function showAutoSuccess(type, entry, changed) {
  document.getElementById('savingState').style.display = 'none';
  const rs = document.getElementById('resultState');
  rs.style.display = 'block';
  rs.className = 'auto-result ok';

  if (type === 'add') {
    document.getElementById('resultTitle').textContent = 'Saved to pipeline ✓';
    document.getElementById('resultSub').textContent = entry.company + (entry.role ? ' — ' + entry.role : '') + ' added as #' + entry.id;
  } else {
    const changedFields = Object.keys(changed).join(', ');
    document.getElementById('resultTitle').textContent = 'Entry #' + entry.id + ' updated ✓';
    document.getElementById('resultSub').textContent = entry.company + ' — ' + changedFields + ' updated';
  }

  // Detail grid
  const rows = [
    ['Company', entry.company],
    ['Role', entry.role || '—'],
    ['Applied', entry.applied || '—'],
    ['Stage', entry.stage],
    ['Contact', entry.hmContact || '—'],
    ['Notes', entry.notes || '—']
  ];
  document.getElementById('detailGrid').innerHTML = rows.map(([l,v]) =>
    `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`
  ).join('');

  // Buttons — edit link goes to manual screen with same params minus auto=1
  const editParams = new URLSearchParams(window.location.search);
  editParams.delete('auto');
  const editUrl = window.location.pathname + '?' + editParams.toString();

  document.getElementById('btnRow').innerHTML = `
    <button onclick="window.location.href='index.html'" class="btn-primary">← Back to Tracker</button>
    <button onclick="window.location.href='${editUrl}'">✏️ Edit this entry</button>
    ${type === 'add' ? `<button class="btn-danger" onclick="undoAdd(${entry.id})">↩ Undo</button>` : ''}
  `;
}

function showAutoError(msg) {
  document.getElementById('savingState').style.display = 'none';
  const rs = document.getElementById('resultState');
  rs.style.display = 'block';
  rs.className = 'auto-result err';
  document.getElementById('resultTitle').textContent = 'Save failed';
  document.getElementById('resultSub').textContent = msg;
  document.getElementById('detailGrid').style.display = 'none';

  const editParams = new URLSearchParams(window.location.search);
  editParams.delete('auto');
  const editUrl = window.location.pathname + '?' + editParams.toString();
  document.getElementById('btnRow').innerHTML = `
    <button class="btn-primary" onclick="window.location.href='${editUrl}'">Try manually</button>
  `;
}

async function undoAdd(id) {
  const btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Undoing…';
  try {
    const r = await fetch(DB);
    const arr = await r.json();
    const filtered = arr.filter(d => d.id !== id);
    await fetch(DB, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(filtered)});
    document.getElementById('resultTitle').textContent = 'Entry removed ✓';
    document.getElementById('resultSub').textContent = 'The entry was deleted from your pipeline.';
    document.getElementById('detailGrid').style.display = 'none';
    document.getElementById('btnRow').innerHTML = `<button onclick="window.location.href='index.html'" class="btn-primary">← Back to Tracker</button>`;
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '↩ Undo';
    alert('Undo failed: ' + e.message);
  }
}

// ── MANUAL SCREEN ─────────────────────────────────────────────────────────────
function initManual() {
  document.getElementById('fApplied').value = new Date().toISOString().split('T')[0];
  const map = {company:'fCompany',role:'fRole',applied:'fApplied',stage:'fStage',contact:'fContact',notes:'fNotes'};
  let filled = false;
  Object.entries(map).forEach(([param, id]) => {
    const val = p.get(param);
    if (val) { document.getElementById(id).value = val; filled = true; }
  });

  if (mode === 'update') {
    document.getElementById('pageTitle').textContent = 'Update Application';
    document.getElementById('pageSub').textContent = 'Review the changes, then confirm.';
    document.getElementById('cardIcon').textContent = '✏️';
    document.getElementById('cardIcon').className = 'ch-icon orange-icon';
    document.getElementById('cardTitle').textContent = 'Update details';
    document.getElementById('cardSub').textContent = 'Only specified fields will be updated';
    document.getElementById('submitBtn').textContent = '✓ Update Pipeline';
    document.getElementById('submitBtn').className = 'btn-submit-orange';
    ['fCompany','fRole','fApplied','fStage','fContact','fNotes'].forEach(id => {
      if (!p.get(Object.entries(map).find(([,v])=>v===id)?.[0])) {
        document.getElementById(id).disabled = true;
        document.getElementById(id).placeholder = '(unchanged)';
      }
    });
    if (filled) {
      const b = document.getElementById('banner');
      b.className = 'banner show update';
      b.innerHTML = '✏️ Updating entry #' + updateId;
    }
  } else if (filled) {
    const b = document.getElementById('banner');
    b.className = 'banner show add';
    b.innerHTML = '✨ Pre-filled from Claude — review and save';
  }

  // DB connection check
  fetch(DB).then(r => {
    if (r.ok) { document.getElementById('dbDot').className='db-dot ok'; document.getElementById('dbLabel').textContent='Firebase connected'; }
    else throw new Error();
  }).catch(() => {
    document.getElementById('dbDot').className='db-dot err'; document.getElementById('dbLabel').textContent='DB error';
  });
}

async function submitManual() {
  const btn = document.getElementById('submitBtn');
  const res = document.getElementById('manualResult');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Saving…';
  res.className = 'result';
  try {
    const r = await fetch(DB);
    if (!r.ok) throw new Error('Read failed');
    const arr = await r.json();
    if (mode === 'update') {
      const idx = arr.findIndex(d => d.id === updateId);
      if (idx === -1) throw new Error('Entry #' + updateId + ' not found');
      const dbMap = {company:'company',role:'role',applied:'applied',stage:'stage',contact:'hmContact',notes:'notes'};
      Object.entries({company:'fCompany',role:'fRole',applied:'fApplied',stage:'fStage',contact:'fContact',notes:'fNotes'}).forEach(([param,elId]) => {
        if (!document.getElementById(elId).disabled) arr[idx][dbMap[param]] = document.getElementById(elId).value.trim();
      });
      const w = await fetch(DB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(arr)});
      if (!w.ok) throw new Error('Write failed');
      res.className = 'result show ok';
      res.innerHTML = '✓ Updated <strong>' + arr[idx].company + '</strong> → ' + arr[idx].stage;
    } else {
      const company = document.getElementById('fCompany').value.trim();
      if (!company) { document.getElementById('fCompany').focus(); btn.disabled=false; btn.innerHTML='＋ Add to Pipeline'; return; }
      const maxId = arr.length ? Math.max(...arr.map(d=>d.id||0)) : 999;
      const entry = {id:maxId+1, company, role:document.getElementById('fRole').value.trim(), applied:document.getElementById('fApplied').value||new Date().toISOString().split('T')[0], stage:document.getElementById('fStage').value, hmContact:document.getElementById('fContact').value.trim(), notes:document.getElementById('fNotes').value.trim()};
      arr.unshift(entry);
      const w = await fetch(DB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(arr)});
      if (!w.ok) throw new Error('Write failed');
      res.className='result show ok';
      res.innerHTML='✓ Added <strong>'+entry.company+'</strong>'+(entry.role?' — '+entry.role:'')+' · ID #'+entry.id;
      clearForm(true);
      window.history.replaceState({},'',window.location.pathname);
    }
  } catch(e) {
    res.className='result show err';
    res.innerHTML='⚠ Failed: '+(e.message||'unknown');
  } finally {
    btn.disabled=false;
    btn.innerHTML = mode==='update'?'✓ Update Pipeline':'＋ Add to Pipeline';
  }
}

function clearForm(keepResult) {
  ['fCompany','fRole','fContact','fNotes'].forEach(id=>{const el=document.getElementById(id);el.value='';el.disabled=false;});
  document.getElementById('fApplied').value=new Date().toISOString().split('T')[0];
  document.getElementById('fApplied').disabled=false;
  document.getElementById('fStage').value='Applied';
  document.getElementById('fStage').disabled=false;
  document.getElementById('banner').className='banner';
  if(!keepResult) document.getElementById('manualResult').className='result';
}

document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter') mode==='update'?submitManual():submitManual();});
</script>
</body>
</html>
